app = "aade-backend-mixalisx"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
ENVIRONMENT = "production"
PORT = "3000"
SERVER_ADDR = "0.0.0.0:3000"
RUST_LOG = "info,aade_validator=info,tower_http=info"

[http_service]
internal_port = 3000
force_https = true
auto_start_machines = true
auto_stop_machines = "stop"
min_machines_running = 1
processes = ["app"]

  [[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health/ready"
